<!DOCTYPE html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Маркетингово проучване за високоплатформени маратонки</title>
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="game.css" />
    <link rel="stylesheet" href="tech-quiz.css" />
  </head>
  <body>
    <div class="container">
      <div id="loader"></div>
      <div id="game" class="justify-center flex-column hidden">
        <div id="hud">
          <div id="hud-item">
            <p id="progressText" class="hud-prefix">Прогрес</p>
            <div id="progressBar">
              <div id="progressBarFull"></div>
            </div>
          </div>
        </div>
        <h2 id="question"></h2>
        <div id="dynamicArea" class="survey-dynamic" hidden></div>
        <div class="choice-container" data-choice-slot="0">
          <p class="choice-prefix">A</p>
          <p class="choice-text" data-index="0"></p>
        </div>
        <div class="choice-container" data-choice-slot="1">
          <p class="choice-prefix">B</p>
          <p class="choice-text" data-index="1"></p>
        </div>
        <div class="choice-container" data-choice-slot="2">
          <p class="choice-prefix">C</p>
          <p class="choice-text" data-index="2"></p>
        </div>
        <div class="choice-container" data-choice-slot="3">
          <p class="choice-prefix">D</p>
          <p class="choice-text" data-index="3"></p>
        </div>
        <p id="surveyError" class="survey-error" hidden></p>
        <a class="btn" href="./index.html" id="homeLink">Към начало</a>
      </div>
    </div>
    <script type="module" src="./tech-quiz.js"></script>
  </body>
</html>
